<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denis Surveys</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 0; }
    header { background: #1e3d59; color: white; padding: 1rem; text-align: center; }
    h1 { margin: 0; }
    main { padding: 2rem; max-width: 800px; margin: auto; }
    section { margin-bottom: 2rem; }
    label { display: block; margin-top: 1rem; }
    input, textarea { width: 100%; padding: 0.5rem; margin-top: 0.5rem; }
    button { margin-top: 1rem; padding: 0.7rem 1.2rem; background: #1e3d59; color: white; border: none; cursor: pointer; }
    button:hover { background: #163049; }
    footer { text-align: center; padding: 1rem; background: #ddd; }
  </style>
</head>
<body>

<header>
  <h1>Denis Surveys</h1>
  <p>Professional Land Surveying Services</p>
</header>

<main>
  <section>
    <h2>About Us</h2>
    <p>Welcome to Denis Surveys! We provide accurate and professional land surveying services.</p>
  </section>

  <section>
    <h2>Contact Us</h2>
    <form action="https://formspree.io/f/mgopnepl" method="POST">
      <label>Your Email:</label>
      <input type="email" name="email" required>

      <label>Your Message:</label>
      <textarea name="message" rows="5" required></textarea>

      <button type="submit">Send</button>
    </form>
  </section>
</main>

<footer>
  &copy; 2026 Denis Surveys
</footer>

</body>
